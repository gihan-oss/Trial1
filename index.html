<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TypeStrike</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div id="app">
    <button id="mute-btn" title="Toggle Sound">&#128266;</button>

    <!-- Menu Screen -->
    <div id="screen-menu" class="screen active">
      <div class="menu-container">
        <h1 class="title">Type<span class="accent">Strike</span></h1>
        <p class="subtitle">Master your keyboard</p>
        <div class="menu-buttons">
          <button class="btn btn-primary" id="btn-play">Play</button>
          <button class="btn" id="btn-leaderboard">Leaderboard</button>
          <button class="btn" id="btn-achievements">Achievements</button>
          <button class="btn" id="btn-stats">Stats</button>
        </div>
      </div>
    </div>

    <!-- Level Select Screen -->
    <div id="screen-levels" class="screen">
      <h2 class="screen-title">Select Level</h2>
      <div id="level-cards" class="level-cards"></div>
      <button class="btn btn-back" id="btn-levels-back">Back</button>
    </div>

    <!-- Countdown Overlay -->
    <div id="countdown-overlay" class="countdown-overlay hidden">
      <span id="countdown-number">3</span>
    </div>

    <!-- Game Screen -->
    <div id="screen-game" class="screen">
      <div id="game-header">
        <div class="stat-box">
          <span class="stat-label">Time</span>
          <span class="stat-value" id="timer">0:00</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">WPM</span>
          <span class="stat-value" id="wpm-live">---</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Accuracy</span>
          <span class="stat-value" id="accuracy-live">100%</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Streak</span>
          <span class="stat-value" id="streak-display">0</span>
        </div>
        <div class="stat-box">
          <span class="stat-label">Score</span>
          <span class="stat-value" id="score-live">0</span>
        </div>
      </div>
      <div id="progress-bar"><div id="progress-fill"></div></div>
      <div id="word-display"></div>
      <p class="game-hint">Start typing to begin...</p>
    </div>

    <!-- Results Screen -->
    <div id="screen-results" class="screen">
      <h2 class="screen-title">Round Complete!</h2>
      <div id="results-content">
        <div class="result-main">
          <div class="result-score" id="result-score">0</div>
          <div class="result-label">Total Score</div>
        </div>
        <div class="results-grid">
          <div class="result-item"><span class="result-key">WPM</span><span class="result-val" id="result-wpm">0</span></div>
          <div class="result-item"><span class="result-key">Accuracy</span><span class="result-val" id="result-accuracy">0%</span></div>
          <div class="result-item"><span class="result-key">Max Streak</span><span class="result-val" id="result-streak">0</span></div>
          <div class="result-item"><span class="result-key">Errors</span><span class="result-val" id="result-errors">0</span></div>
          <div class="result-item"><span class="result-key">Time</span><span class="result-val" id="result-time">0:00</span></div>
          <div class="result-item"><span class="result-key">Level</span><span class="result-val" id="result-level">1</span></div>
        </div>
        <div id="bonuses-list" class="bonuses-list"></div>
        <div id="new-record" class="new-record hidden">New Personal Best!</div>
        <div id="name-entry" class="name-entry hidden">
          <p>Top 10! Enter your name:</p>
          <input type="text" id="name-input" maxlength="3" placeholder="AAA" autocomplete="off">
          <button class="btn btn-small" id="btn-save-score">Save</button>
        </div>
      </div>
      <div class="result-buttons">
        <button class="btn btn-primary" id="btn-play-again">Play Again</button>
        <button class="btn" id="btn-next-level">Next Level</button>
        <button class="btn btn-back" id="btn-results-menu">Menu</button>
      </div>
    </div>

    <!-- Leaderboard Screen -->
    <div id="screen-leaderboard" class="screen">
      <h2 class="screen-title">Leaderboard</h2>
      <div class="level-tabs" id="leaderboard-tabs"></div>
      <div id="leaderboard-table" class="leaderboard-table"></div>
      <button class="btn btn-back" id="btn-leaderboard-back">Back</button>
    </div>

    <!-- Achievements Screen -->
    <div id="screen-achievements" class="screen">
      <h2 class="screen-title">Achievements</h2>
      <div id="achievements-grid" class="achievements-grid"></div>
      <button class="btn btn-back" id="btn-achievements-back">Back</button>
    </div>

    <!-- Stats Screen -->
    <div id="screen-stats" class="screen">
      <h2 class="screen-title">Your Stats</h2>
      <div id="stats-content" class="stats-content"></div>
      <button class="btn btn-back" id="btn-stats-back">Back</button>
    </div>

    <!-- Toast Container -->
    <div id="toast-container"></div>
  </div>

  <script src="game.js"></script>
</body>
</html>
